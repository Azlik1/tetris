apiVersion: v1
kind: Service
metadata:
  name: tetris-backend
  namespace: tetris-game
  labels:
    app: tetris-backend
    version: v1.0.0
spec:
  type: NodePort
  selector:
    app: tetris-backend
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30000
    name: http
  sessionAffinity: ClientIP