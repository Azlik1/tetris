version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tetris-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: tetris_game
    volumes:
      - mysql-data:/var/lib/mysql
      - ./server/modules/database/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "-uroot", "-p123456", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tetris-network

  redis:
    image: redis:7-alpine
    container_name: tetris-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - tetris-network

  backend:
    build: ./backend
    container_name: tetris-backend
    ports:
      - "3000:3000"
    working_dir: /app
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DATABASE=tetris_game
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./frontend:/frontend:ro
    networks:
      - tetris-network

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  tetris-network:
    driver: bridge
